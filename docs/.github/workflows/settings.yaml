name: Settings

on:
  push:
    branches:
      - "main"
      - "master"

jobs:
  testing:
    runs-on: ubuntu-latest
    name: Testing
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Python Installing
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Requirements Installing
        run: pip install -r requirements.txt

      - name: Tests
        run: python -m unittest discover tests/
